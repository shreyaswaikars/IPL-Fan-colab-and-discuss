name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: apl-shreyaswaikars-challenge1
  REGION: us-central1
  SERVICE_NAME: ipl-fan-platform
  IMAGE_NAME: us-central1-docker.pkg.dev/apl-shreyaswaikars-challenge1/cloud-run-source-deploy/ipl-fan-platform

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
          
          # If using Workload Identity Federation instead of a Service Account Key, use this block instead:
          # workload_identity_provider: 'projects/993301675818/locations/global/workloadIdentityPools/github/providers/my-repo'
          # service_account: 'my-service-account@apl-shreyaswaikars-challenge1.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Artifact Registry
        run: |-
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |-
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push Docker image
        run: |-
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated'
